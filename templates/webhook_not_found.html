<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Not Found — Gundi Webhook Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #0a0a0f;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #12121a;
            border: 1px solid #2a2a3a;
            border-radius: 14px;
            padding: 48px 56px;
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        .icon {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 2rem;
            color: #64748b;
            margin-bottom: 20px;
            letter-spacing: -0.05em;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 12px;
        }
        .filter-value {
            color: #94a3b8;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            background: #1a1a26;
            border: 1px solid #2a2a3a;
            padding: 4px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 32px;
            word-break: break-all;
        }
        a.home-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #6366f1;
            color: #fff;
            text-decoration: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.875rem;
            transition: background 150ms ease;
        }
        a.home-link:hover { background: #818cf8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">{ ? }</div>
        <h1>Filter not found</h1>
        <p class="subtitle">No filter exists for webhook value:</p>
        <div class="filter-value">{{ filter_value }}</div>
        <a href="/" class="home-link">&#8592; Back to editor</a>
    </div>
</body>
</html>
